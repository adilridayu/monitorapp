version: '3.8'

services:
  # PostgreSQL - Database transaksional
  postgres:
    image: postgres:15-alpine
    container_name: warehouse_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-warehouse_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgresql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - warehouse_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-warehouse_admin} -d ${POSTGRES_DB:-warehouse_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - Database untuk logs dan AI outputs
  mongodb:
    image: mongo:7
    container_name: warehouse_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-mongo_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-secure_password_123}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - warehouse_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Caching dan message broker
  redis:
    image: redis:7-alpine
    container_name: warehouse_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-secure_password_123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - warehouse_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ - Message queue untuk event-driven architecture
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: warehouse_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbitmq_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-secure_password_123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"   # AMQP port
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"  # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - warehouse_network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API - NestJS
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: warehouse_backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-warehouse_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_db}
      MONGODB_URI: mongodb://${MONGO_USER:-mongo_admin}:${MONGO_PASSWORD:-secure_password_123}@mongodb:27017/warehouse_logs?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secure_password_123}
      RABBITMQ_URI: amqp://${RABBITMQ_USER:-rabbitmq_admin}:${RABBITMQ_PASSWORD:-secure_password_123}@rabbitmq:5672
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_change_in_production}
      JWT_EXPIRES_IN: 1h
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-your_super_secret_refresh_key_change_in_production}
      REFRESH_TOKEN_EXPIRES_IN: 7d
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ../backend:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - warehouse_network

  # AI Service - Python FastAPI
  ai-service:
    build:
      context: ../ai-service
      dockerfile: Dockerfile
    container_name: warehouse_ai_service
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      APP_ENV: ${APP_ENV:-development}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-warehouse_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_123}
      POSTGRES_DB: ${POSTGRES_DB:-warehouse_db}
      MONGODB_URI: mongodb://${MONGO_USER:-mongo_admin}:${MONGO_PASSWORD:-secure_password_123}@mongodb:27017/warehouse_ai?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-secure_password_123}
    ports:
      - "${AI_PORT:-8000}:8000"
    volumes:
      - ../ai-service:/app
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - warehouse_network

  # Nginx - Reverse proxy
  nginx:
    image: nginx:alpine
    container_name: warehouse_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - ai-service
    networks:
      - warehouse_network

  # Adminer - Database management UI (optional, development only)
  adminer:
    image: adminer:latest
    container_name: warehouse_adminer
    restart: unless-stopped
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres
    networks:
      - warehouse_network
    profiles:
      - dev

networks:
  warehouse_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local