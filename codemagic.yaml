workflows:
  flutter-workflow:
    name: Flutter Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    pubspec_path: frontend/pubspec.yaml
    environment:
      vars:
        FLUTTER_VERSION: "3.16.0"
      flutter: stable
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: 'master'
          include: true
          source: true
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/.gradle/caches
        - $HOME/Library/Caches/CocoaPods
    working_directory: frontend
    scripts:
      - name: Set up Flutter
        script: |
          flutter --version
          dart --version
      
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      
      - name: Build APK
        script: |
          flutter build apk --release
      
      - name: Run Flutter analyze
        script: |
          flutter analyze
      
      - name: Run tests
        script: |
          flutter test
    artifacts:
      - frontend/build/**/outputs/**/*.apk
      - frontend/build/**/outputs/**/*.aab
      - frontend/build/**/outputs/**/mapping.txt
      - flutter_drive.log
      - output.json
    publishing:
      email:
        recipients:
          - adilridayu12@gmail.com
        notify:
          success: true
          failure: true
