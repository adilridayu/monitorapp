name: warehouse_intelligence
description: Enterprise Warehouse Monitoring System with AI-powered insights

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.22.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # UI Components
  flutter_material_design_icons: ^1.1.7096
  fl_chart: ^0.65.0
  shimmer: ^3.0.0
  flutter_slidable: ^3.0.1
  pull_to_refresh: ^2.0.0
  infinite_scroll_pagination: ^4.0.0

  # Navigation
  go_router: ^12.1.1
  auto_route: ^8.0.4

  # Networking
  dio: ^5.4.0
  retrofit: ^4.0.3
  web_socket_channel: ^2.4.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Authentication
  jwt_decoder: ^2.0.1

  # Utilities
  intl: ^0.18.1
  uuid: ^4.2.2
  equatable: ^2.0.5
  dartz: ^0.10.1
  either_dart: ^1.0.0
  json_annotation: ^4.8.1
  collection: ^1.18.0

  # Forms & Validation
  formz: ^0.7.0

  # Date & Time
  jiffy: ^6.2.1

  # Device
  device_info_plus: ^9.1.1
  connectivity_plus: ^5.0.2

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Image Handling
  cached_network_image: ^3.3.1

  # QR Code
  mobile_scanner: ^3.5.6

  # PDF Generation
  pdf: ^3.10.7
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.0.4
  hive_generator: ^2.0.1
  auto_route_generator: ^8.0.0
  mockito: ^5.4.4

  # Linting
  flutter_lints: ^3.0.1
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true

